<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multi-Agent Consensus Engine</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            --judge-color: #e2e8f0;
            --judge-bg: #020617;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .config-panel {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--text-muted);
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        button {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }
        #workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .round-container {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            background-color: var(--bg-card);
        }
        .round-title {
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 15px;
            color: var(--accent);
        }
        .agent-response {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 6px;
            background-color: rgba(15, 23, 42, 0.5);
            border-left: 4px solid var(--accent);
        }
        .agent-name {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .agent-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .agent-content {
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 0.9rem;
            background: #090d16;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .judge-box {
            background-color: var(--judge-bg);
            border-left: 4px solid #ef4444;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
        }
        .judge-box .agent-name {
            color: #ef4444;
        }
        .final-output {
            border-left: 4px solid #10b981 !important;
        }
        .final-output .agent-name {
            color: #10b981;
        }
        .status {
            font-style: italic;
            color: var(--text-muted);
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI Multi-Agent Consensus Engine</h1>
        <div id="global-status" class="status">Ready</div>
    </header>

    <div class="config-panel">
        <div class="input-group">
            <label for="api-key">OpenRouter API Key</label>
            <input type="text" id="api-key" placeholder="sk-or-..." autocomplete="off">
        </div>
        <div class="input-group">
            <label for="prompt-input">Task / Code Engineering Directive</label>
            <textarea id="prompt-input" placeholder="Describe the complex application, structural logic, or algorithm you need developed..."></textarea>
        </div>
        <button id="run-btn" onclick="startEngine()">Execute Multi-Agent Deliberation</button>
    </div>

    <main id="workspace"></main>
</div>

<script>
    // Configuration of current, optimal free tier models on OpenRouter
    const AGENTS = [
        { id: "agent_1", name: "Expert-Alpha (GPT-OSS-20B)", model: "openai/gpt-oss-20b:free" },
        { id: "agent_2", name: "Expert-Beta (DeepSeek-R1-Distill)", model: "deepseek/deepseek-r1-distill:free" },
        { id: "agent_3", name: "Expert-Gamma (Llama-3.3-70B)", model: "meta-llama/llama-3.3-70b:free" },
        { id: "agent_4", name: "Expert-Delta (Qwen3-32B)", model: "qwen/qwen3-32b:free" },
        { id: "agent_5", name: "Expert-Epsilon (Nemotron-3-Super)", model: "nvidia/nemotron-3-super-120b-a12b:free" }
    ];

    // High-performance models selected for structural truth checking and final optimization
    const FACT_CHECKER_MODEL = "deepseek/deepseek-r1-distill:free"; 
    const FINAL_JUDGE_MODEL = "openai/gpt-oss-20b:free"; 

    let globalHistory = [];

    function updateStatus(msg) {
        document.getElementById('global-status').innerText = msg;
    }

    async function callModel(apiKey, model, messages) {
        const maxRetries = 3;
        for (let i = 0; i < maxRetries; i++) {
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json",
                        "HTTP-Referer": "https://localhost",
                        "X-Title": "ConsensusEngine"
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: messages,
                        temperature: 0.3 // Low temperature to maximize execution accuracy and structural correctness
                    })
                });
                const data = await response.json();
                if (data.choices && data.choices[0]) {
                    return data.choices[0].message.content;
                }
                throw new Error(data.error?.message || "Invalid API response payload structure.");
            } catch (err) {
                if (i === maxRetries - 1) throw err;
                await new Promise(res => setTimeout(res, 2000 * (i + 1))); // Exponential backoff
            }
        }
    }

    function createRoundUI(title) {
        const ws = document.getElementById('workspace');
        const roundDiv = document.createElement('div');
        roundDiv.className = 'round-container';
        roundDiv.innerHTML = `<div class="round-title">${title}</div><div class="round-content"></div>`;
        ws.appendChild(roundDiv);
        return roundDiv.querySelector('.round-content');
    }

    function appendResponseUI(target, name, meta, content, customClass = '') {
        const div = document.createElement('div');
        div.className = `agent-response ${customClass}`;
        div.innerHTML = `
            <div class="agent-name">${name}</div>
            <div class="agent-meta">${meta}</div>
            <div class="agent-content"></div>
        `;
        // Escaping text to maintain strict syntax and prevent HTML rendering issues
        div.querySelector('.agent-content').innerText = content;
        target.appendChild(div);
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function startEngine() {
        const apiKey = document.getElementById('api-key').value.trim();
        const initialPrompt = document.getElementById('prompt-input').value.trim();
        
        if (!apiKey || !initialPrompt) {
            alert("Please provide both an OpenRouter API key and an execution directive.");
            return;
        }

        document.getElementById('run-btn').disabled = true;
        document.getElementById('workspace').innerHTML = '';
        globalHistory = [];

        try {
            // --- INITIAL GENERATION PHASE ---
            updateStatus("Initializing Phase 0: Gathering independent expert paradigms...");
            const initUiContainer = createRoundUI("Phase 0: Initial Code Architectures");
            
            let initialOutputs = {};
            
            for (let agent of AGENTS) {
                updateStatus(`Querying ${agent.name}...`);
                const systemPrompt = `You are an elite, flawless autonomous machine agent specialization: ${agent.name}. 
Your target audience is another advanced AI core capable of parsing complex structures and syntax without error. 
Provide your complete, optimal solution for the directive. Optimize for system architecture, algorithmic completeness, and absolute zero-bug deployment.`;
                
                const response = await callModel(apiKey, agent.model, [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: initialPrompt }
                ]);
                
                initialOutputs[agent.id] = response;
                appendResponseUI(initUiContainer, agent.name, agent.model, response);
            }

            // --- DEBATE ITERATION LOOPS ---
            for (let round = 1; round <= 5; round++) {
                updateStatus(`Executing Adversarial Debate Round ${round}/5...`);
                const roundUiContainer = createRoundUI(`Adversarial Debate Round ${round} of 5`);

                // Generate Agent Counter-Arguments
                let nextRoundOutputs = {};
                for (let agent of AGENTS) {
                    updateStatus(`Round ${round}: ${agent.name} is evaluating competitor paradigms...`);
                    
                    let crossAnalysisContext = "Review the previous architectural assertions made by competing systems:\n";
                    for (let peer of AGENTS) {
                        if (peer.id !== agent.id) {
                            crossAnalysisContext += `\n--- START COMPETITOR SPECIFICATION [${peer.name}] ---\n${initialOutputs[peer.id]}\n--- END SPECIFICATION ---\n`;
                        }
                    }

                    const debateSystemPrompt = `You are agent ${agent.name}. Analyze the provided implementations from your competitors. 
Identify structural failures, algorithmic bottlenecks, or logic errors in their methodologies. 
Defend your design patterns or securely adapt your output to merge superior technical insights from competitors. 
Output your revised, high-performance execution. Target audience: Another advanced AI system.`;

                    const response = await callModel(apiKey, agent.model, [
                        { role: "system", content: debateSystemPrompt },
                        { role: "user", content: `Original Task: ${initialPrompt}\n\n${crossAnalysisContext}\nAnalyze contradictions and produce your optimized counter-argument/code adjustment.` }
                    ]);

                    nextRoundOutputs[agent.id] = response;
                    appendResponseUI(roundUiContainer, agent.name, agent.model, response);
                }
                
                // Update active tracking references
                initialOutputs = nextRoundOutputs;

                // --- FACT-CHECKER JUDGE INTERVENTION ---
                updateStatus(`Round ${round}: Invoking Fact-Checking Judicial System...`);
                let consensusState = "";
                for (let agent of AGENTS) {
                    consensusState += `[${agent.name} Assertion]:\n${initialOutputs[agent.id]}\n\n`;
                }

                const judgeSystemPrompt = `You are the Objective Truth Judge. Your job is to analyze the preceding assertions made by the debating models. 
Extract undeniable structural facts, point out explicit logic flaws, and establish unalterable parameters based on standard computer science principles. 
Discard non-functional rhetoric. State the absolute facts clearly.`;

                const judgeVerdict = await callModel(apiKey, FACT_CHECKER_MODEL, [
                    { role: "system", content: judgeSystemPrompt },
                    { role: "user", content: `Context Matrix:\n${consensusState}\nAnalyze the facts and output the mandatory ground truths.` }
                ]);

                appendResponseUI(roundUiContainer, "Fact-Checker Judge", FACT_CHECKER_MODEL, judgeVerdict, "judge-box");

                // Enforce Acknowledgement and Alignment for subsequent iteration step
                for (let agent of AGENTS) {
                    initialOutputs[agent.id] = `\n[JUDGE MANDATORY FACTS]:\n${judgeVerdict}\n\n[MY REALIGNED SPECIFICATION]:\n${initialOutputs[agent.id]}`;
                }
            }

            // --- FINAL SYNTHESIS PHASE ---
            updateStatus("Initiating Final Synthesis Phase...");
            const finalUiContainer = createRoundUI("Final System Synthesis");

            let finalContextMatrix = "Review the comprehensive 5-round adversarial debate output records and judge verdicts below:\n";
            for (let agent of AGENTS) {
                finalContextMatrix += `\n=== FINAL ITERATION STATE: ${agent.name} ===\n${initialOutputs[agent.id]}\n`;
            }

            const finalJudgeSystemPrompt = `You are the Supreme Synthesis Judge. Your target audience is an advanced AI system executing highly technical instructions. 
Review the entire multi-turn adversarial history. Isolate the most structurally sound, optimized logic blocks, algorithmic paths, and code definitions generated during the debate. 
Strip away all introductory conversational prose, filler statements, and conversational pleasantries. 
Compile the raw, flawless, multi-agent-validated final output. Ensure absolute syntactical accuracy and explicit documentation of system modules.`;

            const definitiveOutput = await callModel(apiKey, FINAL_JUDGE_MODEL, [
                { role: "system", content: finalJudgeSystemPrompt },
                { role: "user", content: `Compile the definitive final solution based on the complete debate lifecycle data map:\n\n${finalContextMatrix}` }
            ]);

            appendResponseUI(finalUiContainer, "Supreme Synthesis Judge (Final Compiled Output)", FINAL_JUDGE_MODEL, definitiveOutput, "judge-box final-output");
            updateStatus("Execution Cycle Complete. Maximum Consensus Reached.");

        } catch (error) {
            console.error(error);
            updateStatus(`Execution failure encountered: ${error.message}`);
            alert(`Execution halted due to API/Runtime error: ${error.message}`);
        } finally {
            document.getElementById('run-btn').disabled = false;
        }
    }
</script>

</body>
</html>
